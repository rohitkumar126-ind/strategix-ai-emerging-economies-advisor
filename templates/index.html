<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Strategix AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 60px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #1a1a2e;
        }
        p.subtitle {
            color: #555;
            margin-bottom: 30px;
        }
        form {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #1a1a2e;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #333;
        }
    </style>
</head>
<body>
    <h1>Strategix AI</h1>
    <p class="subtitle">Market Entry & Business Strategy Advisor for Emerging Economies</p>

    <form action="/analyze" method="POST">
        <label for="industry">Industry / Product Category</label>
        <input type="text" id="industry" name="industry" placeholder="e.g. Packaged snacks, D2C skincare" required>

        <label for="region">Target Region (India)</label>
        <input type="text" id="region" name="region" placeholder="e.g. Bihar, Tamil Nadu, Tier-2 cities" required>

        <label for="objective">Business Objective</label>
        <select id="objective" name="objective">
            <option value="Launch">Launch a new product</option>
            <option value="Expand">Expand existing presence</option>
            <option value="Test-market">Test-market before scaling</option>
        </select>

        <button type="submit">Generate Strategy Report</button>
    </form>
</body>
</html>
